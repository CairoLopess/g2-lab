spring.application.name=medical-ai-transcriber
spring.main.allow-bean-definition-overriding=true

# Database Configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5435/medic_ai}
spring.datasource.username=${DATABASE_USERNAME:admin}
spring.datasource.password=${DATABASE_PASSWORD:medic_ai@10}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=${SHOW_SQL:true}

# JWT
api.security.token.secret=${JWT_SECRET:medic-ai-jwt-secret-2024}

# CORS
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# OpenAI API Key
openai.api-key=${OPENAI_API_KEY:}

# LangChain4j Chat Model Configuration
langchain4j.open-ai.chat-model.api-key=${OPENAI_API_KEY:}
langchain4j.open-ai.chat-model.model-name=gpt-4o-mini
langchain4j.open-ai.chat-model.temperature=0.0

# LangChain4j Audio Transcription Model Configuration
langchain4j.open-ai.audio-transcription-model.api-key=${OPENAI_API_KEY:}
langchain4j.open-ai.audio-transcription-model.model-name=whisper-1

# Deepgram
deepgram.api.key=${DEEPGRAM_API_KEY:}
deepgram.model=nova-2
deepgram.language=pt-BR
deepgram.project.id=${DEEPGRAM_PROJECT_ID:}

# File Upload
spring.servlet.multipart.max-file-size=1GB
spring.servlet.multipart.max-request-size=1GB

# Cloudflare R2 (opcional)
r2.enabled=${R2_ENABLED:false}
r2.account.id=${R2_ACCOUNT_ID:}
r2.bucket.name=${R2_BUCKET_NAME:medic-ai-audios}
r2.access.key.id=${R2_ACCESS_KEY:}
r2.secret.access.key=${R2_SECRET_KEY:}

# Server port
server.port=${PORT:8080}
