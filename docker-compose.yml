services:
  postgres:
    image: postgres:16-alpine
    container_name: medic_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: medic_ai@10
      POSTGRES_DB: medic_ai
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  medic_adminer:
    image: adminer
    container_name: medic_adminer
    ports:
      - "8081:8080"
    restart: unless-stopped

volumes:
  postgres_data:
